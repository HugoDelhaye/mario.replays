# Configuration for mario.replays project
# All values can be overridden via command-line flags

# Dataset paths
mario_dataset: sourcedata/mario         # Path to mario dataset root
stimuli_path: null               # Path to stimuli (defaults to {mario_dataset}/stimuli)
output_dir: ./   # Output directory for derivatives

# Game configuration
game_name: SuperMarioBros-Nes

# Processing options (defaults for create-replays task)
n_jobs: -1            # Number of parallel jobs (-1 = all CPU cores)
save_videos: true    # Save playback videos (.mp4)
save_variables: true  # Save game variables (.json)
save_ramdumps: true  # Save RAM dumps (.npz)
save_confs: true     # Save psychophysical confounds (.npy)
